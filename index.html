<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VortinT | Precision Design</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/typed.js@2.1.0/dist/typed.umd.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Noto+Sans+SC:wght@900&display=swap');
        
        body { font-family: 'Space Grotesk', 'Noto Sans SC', sans-serif; background: #FFFFFF; overflow-x: hidden; color: #0f172a; }

        /* 💡 核心改动：开场闪屏弹窗 */
        #splash-screen {
            position: fixed; inset: 0; background: #fff;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 10000; transition: all 1s cubic-bezier(0.16, 1, 0.3, 1);
        }
        /* Logo 动画 */
        .splash-logo {
            width: 180px; height: 180px; border-radius: 50%;
            animation: splashPulse 1.8s ease-in-out forwards;
            box-shadow: 0 20px 50px rgba(0,0,0,0.05);
        }
        @keyframes splashPulse {
            0% { transform: scale(0.8); opacity: 0; filter: blur(10px); }
            50% { transform: scale(1.05); opacity: 1; filter: blur(0px); }
            100% { transform: scale(1); opacity: 1; }
        }
        /* 消失时的状态 */
        .hide-splash { transform: translateY(-100%); opacity: 0; pointer-events: none; }

        /* 导航条（初始隐藏，闪屏后再出现） */
        .floating-nav {
            position: fixed; top: 1.5rem; left: 50%; transform: translateX(-50%);
            z-index: 100; width: 90vw; max-width: 1200px;
            background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(20px);
            border-radius: 99px; padding: 1rem 1.5rem;
            display: flex; justify-content: space-between; items-center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.04);
            opacity: 0; transition: 1s 0.8s; /* 稍微延迟一点点出现 */
        }
        .nav-show { opacity: 1; }

        .detail-section { border-bottom: 1px solid #f8fafc; padding: 8rem 0; }
        .buy-btn {
            background: #2563eb; color: white; padding: 1rem 2.5rem; border-radius: 99px;
            font-weight: 800; font-size: 0.85rem; transition: 0.3s;
        }
        .buy-btn:hover { transform: translateY(-3px); box-shadow: 0 15px 30px rgba(37,99,235,0.2); }
    </style>
</head>
<body>

    <div id="splash-screen">
        <img src="https://res.cloudinary.com/dpr2pn5rs/image/upload/v1775785448/%E5%BE%AE%E4%BF%A1%E5%9B%BE%E7%89%87_20260313164434_36_18_pwgssq.jpg" 
             class="splash-logo">
        <p class="mt-8 text-[10px] font-black tracking-[0.5em] text-slate-300 uppercase animate-pulse">Initializing Identity</p>
    </div>

    <nav id="mainNav" class="floating-nav">
        <img src="https://res.cloudinary.com/dpr2pn5rs/image/upload/v1775785448/%E5%BE%AE%E4%BF%A1%E5%9B%BE%E7%89%87_20260313164434_36_18_pwgssq.jpg" 
             onclick="handleLogoClick()" class="h-10 w-10 rounded-full cursor-pointer hover:rotate-12 transition-transform">
        <div class="flex items-center space-x-3">
            <button onclick="toggleLang()" class="text-[10px] font-bold text-slate-300 hover:text-blue-600 transition-colors mr-2">EN/中</button>
            <a href="mailto:gd@vortexd.com" class="bg-slate-50 text-slate-500 px-5 py-2.5 rounded-full font-bold text-[10px] uppercase">GD Support</a>
            <a href="mailto:cs@vortexd.com" class="bg-blue-600 text-white px-5 py-2.5 rounded-full font-bold text-[10px] uppercase shadow-lg shadow-blue-500/20">CS Support</a>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-6 pt-32">
        <header class="py-12">
            <p class="text-sm text-slate-400 font-bold tracking-widest uppercase">Empowering <span id="typed" class="text-blue-600"></span></p>
        </header>

        <section class="mb-16 rounded-[2.5rem] overflow-hidden bg-slate-100 shadow-2xl">
            <div class="aspect-video w-full">
                <video id="brandVideo" class="w-full h-full object-cover" autoplay muted loop playsinline controls></video>
            </div>
        </section>

        <div id="product-list" class="divide-y divide-slate-50"></div>
    </main>

    <footer class="py-24 text-center">
        <p class="text-slate-200 text-[9px] font-black tracking-[0.5em] uppercase">VortinT Labs © 2026</p>
    </footer>

    <div id="adminPanel" class="fixed inset-0 bg-white z-[9999] hidden items-center justify-center" onclick="this.style.display='none'">
        <div class="text-center" onclick="event.stopPropagation()">
            <div class="flex space-x-12 mb-8">
                <div><p class="text-[10px] text-slate-400">VISITS</p><p id="vCount" class="text-5xl font-black">0</p></div>
                <div><p class="text-[10px] text-slate-400">UNITS</p><p id="pCount" class="text-5xl font-black">0</p></div>
            </div>
            <button onclick="localStorage.clear(); location.reload();" class="text-[9px] font-bold text-red-400 border border-red-50 px-6 py-2 rounded-full">RESET</button>
        </div>
    </div>

    <script>
        const VIKA_TOKEN = "usk6WsQlH4X6ST2hQRk4vAz"; 
        const SHEET_ID = "dstUcVqARey53sJnMh";
        const RAW_VIDEO = "https://res.cloudinary.com/dpr2pn5rs/video/upload/v1776075209/4%E6%9C%8813%E6%97%A5_1_iiorev.mp4";

        let allProducts = []; let logoClicks = 0;

        async function init() {
            document.getElementById('brandVideo').src = RAW_VIDEO;
            
            // 💡 闪屏消失逻辑
            setTimeout(() => {
                document.getElementById('splash-screen').classList.add('hide-splash');
                document.getElementById('mainNav').classList.add('nav-show');
            }, 2200); // 2.2秒后消失，给足面子

            try {
                const res = await fetch(`https://api.vika.cn/fusion/v1/datasheets/${SHEET_ID}/records`, {
                    headers: { 'Authorization': `Bearer ${VIKA_TOKEN}` }
                });
                const data = await res.json();
                if (data.success) {
                    allProducts = data.data.records;
                    updateContent();
                    document.getElementById('pCount').innerText = allProducts.length;
                    let v = (parseInt(localStorage.getItem('v_total') || 0) + 1);
                    document.getElementById('vCount').innerText = v;
                    localStorage.setItem('v_total', v);
                }
            } catch (e) { console.error(e); }
        }

        function handleLogoClick() {
            logoClicks++;
            if(logoClicks === 5) { document.getElementById('adminPanel').style.display = 'flex'; logoClicks = 0; }
            setTimeout(() => logoClicks = 0, 3000);
        }

        function renderUI() {
            const list = document.getElementById('product-list');
            list.innerHTML = allProducts.map((r, i) => {
                const f = r.fields;
                let img = Array.isArray(f['图片']) ? f['图片'][0].url : (f['图片'] || "");
                return `
                <section class="detail-section flex flex-col md:flex-row gap-16 items-center">
                    <div class="w-full md:w-1/2">
                        <img src="${img.replace("http://", "https://")}" class="w-full rounded-[2rem] shadow-xl">
                    </div>
                    <div class="w-full md:w-1/2 space-y-6">
                        <h2 class="text-2xl md:text-3xl font-black text-slate-800 tracking-tight">${f['标题'] || 'VortinT Unit'}</h2>
                        <p class="text-slate-400 text-lg leading-relaxed">Engineered for modern space optimization with our proprietary storage system.</p>
                        <div class="pt-4"><a href="${f['链接'] || '#'}" target="_blank" class="buy-btn">DISCOVER →</a></div>
                    </div>
                </section>`;
            }).join('');
        }

        function updateContent() {
            new Typed('#typed', { 
                strings: ['Living Space.', 'Design.', 'Future.'], 
                typeSpeed: 60, loop: true
            });
            renderUI();
        }

        window.onload = init;
    </script>
</body>
</html>
