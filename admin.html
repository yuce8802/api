<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VortinT | Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@700&display=swap');
        body { font-family: 'Space Grotesk', sans-serif; background: #f8fafc; color: #1e293b; }
        .glass { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.5); }
        .card { transition: all 0.3s ease; }
        .card:hover { transform: translateY(-2px); box-shadow: 0 10px 20px rgba(0,0,0,0.05); }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-6xl mx-auto">
        <header class="flex justify-between items-center mb-10">
            <div>
                <h1 class="text-2xl font-black tracking-tighter text-blue-600">VORTINT ADMIN</h1>
                <p class="text-xs text-slate-400 font-bold uppercase tracking-widest">Inventory Intelligence</p>
            </div>
            <div class="flex space-x-3">
                <button onclick="fetchData()" class="bg-white px-4 py-2 rounded-lg text-xs font-bold border border-slate-200 hover:bg-slate-50 transition-all">REFRESH</button>
                <a href="https://vika.cn" target="_blank" class="bg-blue-600 text-white px-4 py-2 rounded-lg text-xs font-bold shadow-lg shadow-blue-200">OPEN VIKA</a>
            </div>
        </header>

        <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-10">
            <div class="glass p-6 rounded-2xl">
                <p class="text-[10px] font-bold text-slate-400 mb-1">TOTAL_UNITS</p>
                <p id="totalCount" class="text-3xl font-black">0</p>
            </div>
            <div class="glass p-6 rounded-2xl border-l-4 border-blue-500">
                <p class="text-[10px] font-bold text-slate-400 mb-1">STATUS</p>
                <p class="text-3xl font-black text-blue-600">LIVE</p>
            </div>
        </div>

        <div id="admin-list" class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div class="animate-pulse text-slate-300">Loading Intelligence...</div>
        </div>
    </div>

    <script>
        const VIKA_TOKEN = "usk6WsQlH4X6ST2hQRk4vAz"; 
        const SHEET_ID = "dstUcVqARey53sJnMh";
        let products = [];

        async function fetchData() {
            try {
                const res = await fetch(`https://api.vika.cn/fusion/v1/datasheets/${SHEET_ID}/records`, {
                    headers: { 'Authorization': `Bearer ${VIKA_TOKEN}` }
                });
                const data = await res.json();
                if (data.success) {
                    products = data.data.records;
                    renderAdminUI();
                    document.getElementById('totalCount').innerText = products.length;
                }
            } catch (e) { alert('Data fetch failed'); }
        }

        // 💡 渲染管理卡片
        function renderAdminUI() {
            const list = document.getElementById('admin-list');
            list.innerHTML = products.map((r, i) => {
                const f = r.fields;
                let img = Array.isArray(f['图片']) ? f['图片'][0].url : (f['图片'] || "");
                return `
                <div class="glass p-6 rounded-3xl card flex space-x-6">
                    <img src="${img.replace("http://", "https://")}" class="w-24 h-24 rounded-2xl object-cover shadow-sm">
                    <div class="flex-grow space-y-3">
                        <div>
                            <label class="text-[9px] font-black text-slate-400 uppercase">Product Title</label>
                            <input id="title-${r.recordId}" type="text" value="${f['标题'] || ''}" 
                                   class="w-full bg-transparent border-b border-slate-100 focus:border-blue-500 outline-none font-bold text-sm py-1">
                        </div>
                        <div>
                            <label class="text-[9px] font-black text-slate-400 uppercase">Amazon/Store Link</label>
                            <input id="link-${r.recordId}" type="text" value="${f['链接'] || ''}" 
                                   class="w-full bg-transparent border-b border-slate-100 focus:border-blue-500 outline-none text-xs py-1 text-blue-500">
                        </div>
                        <button onclick="updateRecord('${r.recordId}')" 
                                class="mt-2 text-[10px] font-black bg-slate-900 text-white px-4 py-2 rounded-lg hover:bg-blue-600 transition-all">
                            UPDATE NOW
                        </button>
                    </div>
                </div>`;
            }).join('');
        }

        // 💡 核心：将修改写回 Vika
        async function updateRecord(recordId) {
            const newTitle = document.getElementById(`title-${recordId}`).value;
            const newLink = document.getElementById(`link-${recordId}`).value;
            
            const btn = event.target;
            btn.innerText = "SAVING...";
            btn.disabled = true;

            try {
                const res = await fetch(`https://api.vika.cn/fusion/v1/datasheets/${SHEET_ID}/records`, {
                    method: 'PATCH',
                    headers: { 
                        'Authorization': `Bearer ${VIKA_TOKEN}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        records: [{
                            recordId: recordId,
                            fields: {
                                "标题": newTitle,
                                "链接": newLink
                            }
                        }]
                    })
                });
                const result = await res.json();
                if (result.success) {
                    btn.innerText = "SUCCESS ✓";
                    btn.classList.replace('bg-slate-900', 'bg-green-500');
                    setTimeout(() => {
                        btn.innerText = "UPDATE NOW";
                        btn.classList.replace('bg-green-500', 'bg-slate-900');
                        btn.disabled = false;
                    }, 2000);
                }
            } catch (e) {
                alert('Update failed');
                btn.disabled = false;
            }
        }

        window.onload = fetchData;
    </script>
</body>
</html>
